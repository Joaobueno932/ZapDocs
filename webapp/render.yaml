services:
  - type: web
    name: zapdocs
    runtime: python
    # If your repo root is the zapdocs/ folder, use these commands as-is.
    # If your repo root is the webapp/ folder, remove the "cd webapp &&" prefix.
    buildCommand: pip install -r webapp/requirements.txt
    startCommand: cd webapp && gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false                  # Set manually in the Render dashboard
      - key: FLASK_ENV
        value: production
      - key: JOB_RETENTION_HOURS
        value: "24"
      - key: MAX_CONTENT_LENGTH_MB
        value: "500"
      # Uncomment and set DATABASE_URL after creating a PostgreSQL database in Render:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: zapdocs-db
      #     property: connectionString

    # Uncomment to add a Persistent Disk so generated PDFs survive redeploys:
    # disk:
    #   name: zapdocs-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # Then also add:
    # - key: TEMP_DIR
    #   value: /var/data/temp_jobs
