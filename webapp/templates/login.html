<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZapDocs — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .login-logo h1 { letter-spacing: -1px; }
    .login-logo h1 span { color: #25D366; }
  </style>
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon" style="background:none;padding:0;box-shadow:none">
        <svg viewBox="0 0 100 100" width="70" height="70" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="login-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#041f1b"/>
              <stop offset="100%" stop-color="#0d5a50"/>
            </linearGradient>
          </defs>
          <rect width="100" height="100" rx="22" fill="url(#login-bg)"/>
          <path d="M 20 24 L 80 24 L 20 76 L 80 76"
                fill="none" stroke="white" stroke-width="11"
                stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="78" cy="78" r="16" fill="#25D366"/>
          <path d="M 80 69 L 73 78 L 77 78 L 74 87 L 83 77 L 79 77 Z" fill="white"/>
        </svg>
      </div>
      <h1><span>Zap</span>Docs</h1>
      <p>Converta conversas em documentos</p>
    </div>

    {% if error %}
    <div class="alert alert-error">
      <span>⚠</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="on">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="username"
          placeholder="Digite seu usuário"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <p class="text-sm mt-16" style="text-align:center; color: #9ca3af;">
      ZapDocs v2.0 &nbsp;·&nbsp; Acesso restrito
    </p>
  </div>

  <div id="toast-container"></div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
